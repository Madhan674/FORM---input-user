<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./output.css">
    <title>madhans form</title>
</head>
<body class="bg-gradient-black from-gray-900 to-gray-800 h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-3xl text-red-600 font-bold mb-8">REGISTRATION FORM</h1>

        <div class="bg-gray-700 text-white rounded-2xl shadow-lg p-8 w-[360px]">

            <div class="text-left">
                <label class="block text-sm font-semibold mb-1">Username</label>
                <input class="w-full px-4 py-2 rounded-md bg-transparent border border-gray-500 placeholder-gray-400" 
                       type="username" 
                       placeholder="Enter your Username">
            </div>

            <div class="text-left">
                <label class="block text-sm font-semibold mb-1">Email</label>
                <input class="w-full px-4 py-2 rounded-md bg-transparent border border-gray-500 placeholder-gray-400" 
                       type="email" 
                       placeholder="Enter your email">
            </div>

            <div class="text-left mt-4">
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input class="w-full px-4 py-2 rounded-md bg-transparent border border-gray-500 placeholder-gray-400" 
                       type="password" 
                       placeholder="Enter your password">
            </div>

            <div class="text-left mt-4">
                <label class="block text-sm font-semibold mb-1"> confirm Password</label>
                <input class="w-full px-4 py-2 rounded-md bg-transparent border border-gray-500 placeholder-gray-400" 
                       type="password" 
                       placeholder="Enter your password">
            </div>

            

            <div class="flex justify-between mt-2 text-sm">
                <a href="" class="hover:underline">already have an account</a>
                <a href="" class="hover:underline">Login</a>
            </div>

            <button class="w-full bg-purple-600 text-white mt-6 py-2 rounded-md hover:bg-purple-700">
                Register
            </button>

</html>
